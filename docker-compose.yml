services:
  dj-pipelinez:
    build: .
    container_name: dj-pipelinez
    restart: unless-stopped
    runtime: nvidia
    gpus: all

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all

      WATCH_DIR: /watch/incoming
      OUTPUT_DIR: /watch/outgoing
      FAILED_DIR: /watch/failed
      WORK_DIR: /watch/work

      MODEL_NAME: realesrgan-x4plus
      TILE_SIZE: "512"
      POLL_INTERVAL: "5"
      TARGET_WIDTH: "3840"
      TARGET_HEIGHT: "2160"
      CQ: "18"
      PRESET: "p5"

    volumes:
      - /mnt/leviathan/data/upscale/incoming:/watch/incoming
      - /mnt/leviathan/data/upscale/outgoing:/watch/outgoing
      - /mnt/leviathan/data/upscale/failed:/watch/failed
      - /mnt/leviathan/data/upscale/work:/watch/work
      - ./state:/state
